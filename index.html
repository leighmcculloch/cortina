<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Cortina @ Bathurst — Mount Panorama Time Trial</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #87a7c9; }
  #game { position: fixed; inset: 0; }
  #game canvas { display: block; width: 100%; height: 100%; }
  /* HUD overlay sits on top of the WebGL canvas */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  /* Boot / loading + tap-to-start gate */
  #boot {
    position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.6em;
    background: radial-gradient(ellipse at 50% 35%, #243b5e 0%, #11213a 70%, #0a1322 100%);
    color: #e7f0ff; font-family: "Segoe UI", system-ui, sans-serif; text-align: center;
    transition: opacity 0.5s ease; user-select: none;
  }
  #boot h1 { margin: 0; font-size: clamp(22px, 4vw, 44px); letter-spacing: 0.04em; font-weight: 700; }
  #boot h1 .blue { color: #4f9bff; }
  #boot p { margin: 0; opacity: 0.85; font-size: clamp(13px, 1.6vw, 16px); }
  #boot .start {
    margin-top: 0.8em; padding: 0.7em 1.6em; border: 1px solid #4f9bff; border-radius: 8px;
    font-size: clamp(15px, 2vw, 20px); color: #fff; background: rgba(79,155,255,0.12);
    cursor: pointer; pointer-events: auto;
  }
  #boot .start:hover { background: rgba(79,155,255,0.28); }
  #boot.hidden { opacity: 0; pointer-events: none; }
  #boot .err { color: #ff9a9a; max-width: 540px; font-size: 13px; white-space: pre-wrap; }
</style>
</head>
<body>
  <div id="game"></div>
  <div id="hud"></div>

  <div id="boot">
    <h1>1964 Ford Cortina &nbsp;<span class="blue">&bull; True Blue</span></h1>
    <p>Mount Panorama Circuit &mdash; Bathurst &mdash; Solo Time Trial</p>
    <p>W/&uarr; throttle &nbsp;&middot;&nbsp; S/&darr; brake &nbsp;&middot;&nbsp; A·D/&larr;&rarr; steer &nbsp;&middot;&nbsp; E/Q shift up·down &nbsp;&middot;&nbsp; Space handbrake</p>
    <p>R respawn &nbsp;&middot;&nbsp; C camera &nbsp;&middot;&nbsp; H help &nbsp;&middot;&nbsp; P pause</p>
    <button class="start" id="startBtn">Start Engine</button>
    <p class="err" id="bootErr"></p>
  </div>

  <!-- Three.js r128 (global UMD build — works from file:// as a classic script) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Team modules: each attaches to window.GAME -->
  <script src="src/car.js"></script>
  <script src="src/track.js"></script>
  <script src="src/vehicle.js"></script>
  <script src="src/hud.js"></script>
  <!-- Integrator / game loop -->
  <script src="src/main.js"></script>
  <script>
    (function () {
      var boot = document.getElementById('boot');
      var btn = document.getElementById('startBtn');
      var err = document.getElementById('bootErr');
      if (typeof THREE === 'undefined') {
        err.textContent = 'Three.js failed to load (offline?). Connect to the internet and reload, '
          + 'or serve a local copy of three.min.js.';
        btn.disabled = true;
        return;
      }
      btn.addEventListener('click', function () {
        try {
          window.GAME.start({ gameEl: document.getElementById('game'), hudEl: document.getElementById('hud') });
          boot.classList.add('hidden');
        } catch (e) {
          err.textContent = 'Failed to start: ' + (e && e.message ? e.message : e) + '\n' + (e && e.stack ? e.stack : '');
          console.error(e);
        }
      });
    })();
  </script>
</body>
</html>
